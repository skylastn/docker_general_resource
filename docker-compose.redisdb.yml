services:
  redis:
    image: redis:latest
    container_name: redis-service
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    mem_limit: "${LIMIT_RAM}g"
    cpus: "${LIMIT_CPU}"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --save 60 1000
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data: